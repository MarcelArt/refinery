{{ define "content" }}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div style="display: flex; justify-content: center; margin-bottom: 16px;">
                <div class="logo">
                    <span class="logo-icon">R</span>
                    <span>Refinery</span>
                </div>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to manage your data extraction workflows</p>
        </div>

        <!-- Form submission target error placeholder -->
        <div id="error-alert"></div>

        <form hx-post="/login" hx-target="#error-alert" hx-swap="outerHTML">
            <div class="form-group">
                <label for="username" class="form-label">Username or Email</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username or email" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div class="form-checkbox-container">
                <label class="checkbox-label">
                    <input type="checkbox" name="isRemember" class="form-checkbox">
                    Remember me
                </label>
            </div>

            <button type="submit" class="btn btn-primary">
                <span>Sign In</span>
                <span class="htmx-indicator spinner"></span>
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Sign up</a>
        </div>
    </div>
</div>
{{ end }}
