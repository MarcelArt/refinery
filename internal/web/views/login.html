{{ define "content" }}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div style="display: flex; justify-content: center; margin-bottom: 16px;">
                <div class="logo">
                    <span class="logo-icon">R</span>
                    <span>Refinery</span>
                </div>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to manage your data extraction workflows</p>
        </div>

        <!-- Form submission target error placeholder -->
        <div id="error-alert">
            {{ if .Error }}
            <div class="alert-error" style="margin-bottom: 20px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>{{ .Error }}</span>
            </div>
            {{ end }}
            {{ if .Info }}
            <div class="alert-success" style="background-color: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 6px; padding: 12px 16px; margin-bottom: 20px; color: #10b981; font-size: 13.5px; display: flex; align-items: center; gap: 8px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span>{{ .Info }}</span>
            </div>
            {{ end }}
        </div>

        <form hx-post="/login" hx-target="#error-alert" hx-swap="outerHTML">
            <div class="form-group">
                <label for="username" class="form-label">Username or Email</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username or email" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div class="form-checkbox-container">
                <label class="checkbox-label">
                    <input type="checkbox" name="isRemember" class="form-checkbox">
                    Remember me
                </label>
            </div>

            <button type="submit" class="btn btn-primary">
                <span>Sign In</span>
                <span class="htmx-indicator spinner"></span>
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Sign up</a>
        </div>
    </div>
</div>
{{ end }}
