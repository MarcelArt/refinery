<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - Refinery</title>
    <!-- HTMX -->
    <script src="/public/scripts/htmx.min.js"></script>
    <!-- Alpine.js -->
    <script src="/public/scripts/alpine.min.js" defer></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/public/css/styles.css?v=1.0.2">
</head>
<body>
    <!-- Global Slim Progress Loading Bar -->
    <div id="top-loading-bar"></div>

    {{ if .HideLayout }}
        {{ template "content" . }}
    {{ else }}
        <div class="dashboard-container" x-data="{ sidebarMinimized: false, activeMenu: '{{ .ActiveMenu }}' }" :class="{ 'sidebar-minimized': sidebarMinimized }">
            <!-- Sidebar -->
            <aside class="sidebar" :class="{ 'minimized': sidebarMinimized }">
                <div class="sidebar-header">
                    <div class="logo">
                        <span class="logo-icon">R</span>
                        <span x-show="!sidebarMinimized" x-transition>Refinery</span>
                    </div>
                </div>

                <nav style="flex: 1;">
                    <ul class="sidebar-menu">
                        <li class="menu-item" :class="{ 'active': activeMenu === 'dashboard' }">
                            <a href="/dashboard"
                               hx-get="/dashboard"
                               hx-target=".main-wrapper"
                               hx-select=".main-wrapper"
                               hx-swap="outerHTML"
                               hx-push-url="true"
                               @click="activeMenu = 'dashboard'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                                <span x-show="!sidebarMinimized" x-transition>Dashboard</span>
                            </a>
                        </li>
                        <li class="menu-item" :class="{ 'active': activeMenu === 'workflows' }">
                            <a href="/workflows"
                               hx-get="/workflows"
                               hx-target=".main-wrapper"
                               hx-select=".main-wrapper"
                               hx-swap="outerHTML"
                               hx-push-url="true"
                               @click="activeMenu = 'workflows'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                <span x-show="!sidebarMinimized" x-transition>Workflows</span>
                            </a>
                        </li>
                        <li class="menu-item" :class="{ 'active': activeMenu === 'api-keys' }">
                            <a href="/api-keys"
                               hx-get="/api-keys"
                               hx-target=".main-wrapper"
                               hx-select=".main-wrapper"
                               hx-swap="outerHTML"
                               hx-push-url="true"
                               @click="activeMenu = 'api-keys'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                                <span x-show="!sidebarMinimized" x-transition>API Keys</span>
                            </a>
                        </li>
                    </ul>
                </nav>

                <div class="sidebar-footer" :style="sidebarMinimized ? 'justify-content: center;' : ''">
                    <div class="user-info" x-show="!sidebarMinimized" x-transition>
                        <span class="user-name">{{ .User.Username }}</span>
                        <span class="user-email">{{ .User.Email }}</span>
                    </div>
                    <a href="/logout" class="btn-logout" title="Log Out" :style="sidebarMinimized ? 'margin: 0;' : ''">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </a>
                </div>
            </aside>

            <!-- Main Wrapper -->
            <div class="main-wrapper" :class="{ 'sidebar-minimized': sidebarMinimized }">
                <!-- Top Bar -->
                <header class="top-bar">
                    <div class="top-bar-left">
                        <button class="btn-toggle-sidebar" @click="sidebarMinimized = !sidebarMinimized" title="Toggle Sidebar">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                        </button>
                        <div class="breadcrumb">
                            <span class="breadcrumb-item">Refinery</span>
                            <span class="breadcrumb-separator">/</span>
                            {{ if .WorkflowID }}
                                <span class="breadcrumb-item">
                                    <a href="/workflows"
                                       hx-get="/workflows"
                                       hx-target=".main-wrapper"
                                       hx-select=".main-wrapper"
                                       hx-swap="outerHTML"
                                       hx-push-url="true"
                                       style="color: var(--text-secondary); text-decoration: none; transition: var(--transition-smooth);"
                                       onmouseover="this.style.color='var(--accent)'"
                                       onmouseout="this.style.color='var(--text-secondary)'">
                                        Workflows
                                    </a>
                                </span>
                                <span class="breadcrumb-separator">/</span>
                                <span class="breadcrumb-item active">{{ .WorkflowTitle }}</span>
                            {{ else }}
                                <span class="breadcrumb-item active">{{ .Title }}</span>
                            {{ end }}
                        </div>
                    </div>
                    <div class="top-bar-right"></div>
                </header>

                <!-- Main Content -->
                <main class="main-content">
                    {{ template "content" . }}
                </main>
            </div>
        </div>
    {{ end }}

    <!-- Global Progress Bar Event Listeners -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadingBar = document.getElementById('top-loading-bar');
            let loadingTimer;

            document.body.addEventListener('htmx:configRequest', () => {
                clearTimeout(loadingTimer);
                // Set initial styling and width
                loadingBar.style.transition = 'width 0.4s ease, opacity 0.2s ease';
                loadingBar.style.opacity = '1';
                loadingBar.style.width = '30%';
                
                // Slow progressive ticks
                loadingTimer = setTimeout(() => {
                    loadingBar.style.width = '60%';
                    loadingTimer = setTimeout(() => {
                        loadingBar.style.width = '85%';
                    }, 800);
                }, 400);
            });

            document.body.addEventListener('htmx:afterRequest', () => {
                clearTimeout(loadingTimer);
                // Complete loading bar sequence
                loadingBar.style.width = '100%';
                loadingTimer = setTimeout(() => {
                    loadingBar.style.opacity = '0';
                    setTimeout(() => {
                        loadingBar.style.width = '0%';
                    }, 200);
                }, 200);
            });
        });
    </script>
</body>
</html>
