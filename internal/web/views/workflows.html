{{ define "content" }}
<div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">R</span>
                <span>Refinery</span>
            </div>
        </div>

        <nav style="flex: 1;">
            <ul class="sidebar-menu">
                <li class="menu-item active">
                    <a href="/workflows">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        Workflows
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <span class="user-name">{{ .User.Username }}</span>
                <span class="user-email">{{ .User.Email }}</span>
            </div>
            <!-- Standard GET logout redirect or clean HTTP request -->
            <a href="/logout" class="btn-logout" title="Log Out">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title">Workflows</h1>
        </header>

        <div class="placeholder-card">
            <div class="placeholder-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <h2 class="placeholder-title">No Workflows Yet</h2>
            <p class="placeholder-desc">Connect your data sources, specify extraction schemas, and start extracting structured data automatically.</p>
            <button class="btn btn-primary" style="width: auto; opacity: 0.7; cursor: not-allowed;" disabled>
                <span>Create Workflow</span>
            </button>
        </div>
    </main>
</div>
{{ end }}
