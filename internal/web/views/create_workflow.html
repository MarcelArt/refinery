{{ define "content" }}
<header class="page-header">
    <div style="display: flex; align-items: center; gap: 12px;">
        <a href="/workflows" class="btn-back"
           hx-get="/workflows"
           hx-target=".main-wrapper"
           hx-select=".main-wrapper"
           hx-swap="outerHTML"
           hx-push-url="true"
           title="Back to list">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <h1 class="page-title" style="margin: 0;">Create Workflow</h1>
    </div>
</header>

<div style="width: 100%; padding-bottom: 40px;">
    <!-- Target error indicator for form submission -->
    <div id="error-alert"></div>

    <form hx-post="/workflows/create" hx-target="#error-alert" hx-swap="outerHTML"
          x-data="{
              schemas: [
                  { key: 'invoice_number', type: 'string', description: 'The invoice reference identifier', example: 'INV-2026-001' },
                  { key: 'total_amount', type: 'number', description: 'The total bill amount including tax', example: '1250.50' }
              ],
              addSchema() {
                  this.schemas.push({ key: '', type: 'string', description: '', example: '' });
              },
              removeSchema(index) {
                  this.schemas.splice(index, 1);
              }
          }">
        <!-- Hidden input holding JSON serialized schemas list -->
        <input type="hidden" name="schemasJson" :value="JSON.stringify(schemas)">

        <!-- Side-by-Side Grid Layout taking full container width -->
        <div style="display: grid; grid-template-columns: 4fr 6fr; gap: 24px; align-items: start; width: 100%; margin-bottom: 20px;">
            
            <!-- Left Card: Workflow Details -->
            <div class="form-card" style="background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; width: 100%;">
                <h2 style="font-size: 14px; margin-bottom: 16px; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.05em;">Workflow Details</h2>
                
                <div class="form-group">
                    <label for="title" class="form-label">Workflow Title</label>
                    <input type="text" id="title" name="title" class="form-input" placeholder="e.g. Invoice Data Extraction" required>
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">Description</label>
                    <input type="text" id="description" name="description" class="form-input" placeholder="e.g. Extract key financial figures from invoice PDFs" required>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label for="prompt" class="form-label">AI Extraction Prompt (Prefilled Example)</label>
                    <textarea id="prompt" name="prompt" class="form-input" style="height: 100px; resize: vertical; font-family: var(--font-sans);" required>Extract key details from the input document such as total amount, invoice number, vendor name, and date.</textarea>
                </div>
            </div>

            <!-- Right Card: Target Schema Fields -->
            <div class="form-card" style="background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; width: 100%; display: flex; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h2 style="font-size: 14px; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.05em;">Target Schema Fields</h2>
                    <button type="button" class="btn btn-primary" style="width: auto; padding: 6px 12px; font-size: 11px;" @click="addSchema">
                        + Add Field
                    </button>
                </div>

                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <!-- Table headers -->
                    <div class="schema-row-header" style="display: grid; grid-template-columns: 1.5fr 1fr 2fr 1.5fr 32px; gap: 8px; font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; padding: 0 4px;">
                        <div>Key</div>
                        <div>Type</div>
                        <div>Description</div>
                        <div>Example</div>
                        <div></div>
                    </div>

                    <!-- Empty State Placeholder inside the card -->
                    <div x-show="schemas.length === 0" style="text-align: center; padding: 24px; color: var(--text-muted); font-size: 13px; border: 1px dashed var(--border-color); border-radius: 4px; width: 100%;">
                        No schema fields defined. Click '+ Add Field' above to define metadata schemas.
                    </div>

                    <!-- Dynamic Rows -->
                    <template x-for="(schema, index) in schemas" :key="index">
                        <div class="schema-row" style="display: grid; grid-template-columns: 1.5fr 1fr 2fr 1.5fr 32px; gap: 8px; align-items: center;">
                            <div>
                                <input type="text" x-model="schema.key" class="form-input" placeholder="e.g. total_tax" required style="font-size: 12px; padding: 6px 10px;">
                            </div>
                            <div>
                                <select x-model="schema.type" class="form-input" style="font-size: 12px; padding: 6px 10px; height: 31px; background-color: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 4px; outline: none; width: 100%;">
                                    <option value="string">String</option>
                                    <option value="number">Number</option>
                                    <option value="date">Date</option>
                                    <option value="boolean">Boolean</option>
                                </select>
                            </div>
                            <div>
                                <input type="text" x-model="schema.description" class="form-input" placeholder="e.g. The tax amount" required style="font-size: 12px; padding: 6px 10px;">
                            </div>
                            <div>
                                <input type="text" x-model="schema.example" class="form-input" placeholder="e.g. 10.50" required style="font-size: 12px; padding: 6px 10px;">
                            </div>
                            <div style="text-align: center;">
                                <button type="button" class="btn-logout" style="padding: 6px; border-radius: 4px; display: flex; align-items: center; justify-content: center;" @click="removeSchema(index)" title="Remove Field">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div style="display: flex; justify-content: flex-end; gap: 12px;">
            <a href="/workflows" class="btn" style="width: auto; background-color: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary);"
               hx-get="/workflows"
               hx-target=".main-wrapper"
               hx-select=".main-wrapper"
               hx-swap="outerHTML"
               hx-push-url="true">
                Cancel
            </a>
            <button type="submit" class="btn btn-primary" style="width: auto;">
                <span>Create Workflow</span>
                <span class="htmx-indicator spinner"></span>
            </button>
        </div>
    </form>
</div>
{{ end }}
