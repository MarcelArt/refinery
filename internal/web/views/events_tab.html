{{ define "tab_content" }}
<div style="width: 100%; display: flex; flex-direction: column; flex: 1; align-items: center; justify-content: center; padding: 40px 20px;">
    <div class="placeholder-card" style="margin: 0 auto; max-width: 500px; border: 1px dashed var(--border-color); background-color: var(--bg-card); border-radius: 6px; padding: 40px 24px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; box-shadow: 0 4px 16px -6px rgba(0, 0, 0, 0.4);">
        <div class="placeholder-icon" style="width: 64px; height: 64px; border-radius: 50%; background-color: var(--bg-input); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid var(--border-color);">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <h2 class="placeholder-title" style="font-size: 20px; font-weight: 600; color: var(--text-primary); margin: 0;">Workflow Events</h2>
        <p class="placeholder-desc" style="color: var(--text-secondary); font-size: 14px; margin: 0; line-height: 1.5;">Real-time webhook events, execution runs history, and external API integration logs will be displayed here in the future.</p>
    </div>
</div>
{{ end }}
